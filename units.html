<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Project</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-container">
        <h1><a href="index.html">Stanley Storage</a></h1>
        <nav>
            <ul>
                <button><a href="index.html">Home</a></button>
                <button><a href="units.html">Units/Pricing</a></button>
                <button><a href="contact.html">Contact</a></button>
            </ul>
        </nav>
    </div>
    </header>
    <main>
        <section class="units">
            <h2> Storage Units & Pricing</h2>
            <div class="units-container">
                    <table class="units-table">
                        <tr>
                            <th>Unit Size</th>
                            <th>Price per Month</th>
                            <th>Fits</th>
                        </tr>
                        <tr onclick="location.href='#unit-5x10';">
                            <td>5x10</td>
                            <td>$35</td>
                            <td>Small furniture, boxes, seasonal items</td>
                        </tr>
                        <tr onclick="location.href='#unit-10x10';">
                            <td>10x10</td>
                            <td>$50</td>
                            <td>Furniture for a small apartment, boxes, appliances</td>
                        </tr>
                        <tr onclick="location.href='#unit-10x20';">
                            <td>10x20</td>
                            <td>$80</td>
                            <td>Furniture for a 2 bedroom apartment / small house</td>
                        </tr>
                    </table>
                    <h3>Unit Diagrams</h3>
                    <div id="unitImages"> <!-- I fought with this for hours trying to find any method to make these dynamically show up when you clicked the respective row
                                                I eventually had to give in after an hour and just have them display below instead. -->
                        <div id="unit-5x10">
                            <img src="5x10.png" alt="5x10 Storage Unit Diagram">
                        </div>
                        <div id="unit-10x10">
                            <img src="10x10.png" alt="10x10 Storage Unit Diagram">
                        </div>
                        <div id="unit-10x20">
                            <img src="10x20.png" alt="10x20 Storage Unit Diagram">
                        </div>
                    </div>
            </div>
        </section>
    </main>
    <footer>
        <p>Copyright &copy; 2025 Stanley Storage</p>
    </footer>
<script src="script.js"></script>
</body>
</html>
